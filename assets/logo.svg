<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Cerberus">
  <title>Cerberus</title>
  <defs>
    <linearGradient id="cerberus-core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <!-- Guard shield: the orchestrator is the only privileged component. -->
  <path d="M32 3 56 12v20c0 14-10.5 24.5-24 29C18.5 56.5 8 46 8 32V12z"
        fill="#0b0c0e" stroke="#2e323a" stroke-width="2" stroke-linejoin="round"/>

  <!-- Links from the orchestrator core out to each head. -->
  <path d="M32 45 19 27M32 45v-18M32 45 45 27"
        stroke="#2e323a" stroke-width="2" stroke-linecap="round"/>

  <!-- Three heads: one agent container per thread. -->
  <g fill="#131519" stroke="#34d399" stroke-width="2.5">
    <circle cx="19" cy="25" r="6"/>
    <circle cx="32" cy="20" r="6"/>
    <circle cx="45" cy="25" r="6"/>
  </g>
  <g fill="#34d399">
    <circle cx="19" cy="25" r="1.8"/>
    <circle cx="32" cy="20" r="1.8"/>
    <circle cx="45" cy="25" r="1.8"/>
  </g>

  <!-- The core that routes to them. -->
  <circle cx="32" cy="45" r="4.5" fill="url(#cerberus-core)"/>
</svg>
