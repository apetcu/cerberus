services:
  orchestrator:
    build: { context: .., dockerfile: packages/orchestrator/Dockerfile }
    env_file: .env
    environment:
      REDIS_URL: redis://orchestrator:orchestrator-dev-password@redis:6379
      AGENT_REDIS_URL: redis://agent:agent-dev-password@redis:6379
      DATABASE_URL: postgres://cerberus:cerberus@postgres:5432/cerberus
      RUNTIME: docker
      AGENT_NETWORK: cerberus-agents
      WORKSPACES_ROOT: /workspaces
      WORKSPACES_HOST_ROOT: ${PWD}/workspaces
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspaces:/workspaces
    # Console + health + metrics. This port carries the orchestrator's own privileges
    # (stop/restart containers, read every thread's conversation), so set DASHBOARD_TOKEN
    # on any host that other people can reach.
    # Not loopback-scoped: OrbStack's forwarder resets connections on a 127.0.0.1-bound
    # publish, which makes the console unreachable from the browser.
    ports: ["8080:8080"]
    networks: [control, agents]
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--aclfile", "/etc/redis/users.acl"]
    volumes:
      - ./redis/users.acl:/etc/redis/users.acl:ro
      - redis-data:/data
    networks: [control, agents]
    healthcheck:
      test: ["CMD", "redis-cli", "-u", "redis://orchestrator:orchestrator-dev-password@localhost:6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: cerberus, POSTGRES_PASSWORD: cerberus, POSTGRES_DB: cerberus }
    volumes: [pg-data:/var/lib/postgresql/data]
    networks: [control]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerberus -d cerberus"]
      interval: 5s
      timeout: 3s
      retries: 10
networks:
  control: {}
  agents: { name: cerberus-agents }
volumes:
  redis-data: {}
  pg-data: {}
